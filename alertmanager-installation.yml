---
- hosts: promethues-server
  become: true
  vars:
    alertmanager_version: "0.27.0"
    alertmanager_user: alertmanager
    alertmanager_dir: /etc/alertmanager
    alertmanager_data_dir: /var/lib/alertmanager

  tasks:
    - name: apt update
      apt:
        update_cache: yes

    - name: Install required dependencies
      apt:
        name:
          - wget
          - tar
        state: present

    - name: Create alertmanager user
      user:
        name: "{{ alertmanager_user }}"
        shell: /sbin/nologin
        create_home: false
        system: true

    - name: Create alertmanager directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ alertmanager_user }}"
        group: "{{ alertmanager_user }}"
        mode: '0755'
      loop:
        - "{{ alertmanager_dir }}"
        - "{{ alertmanager_data_dir }}"

    - name: Download Alertmanager binary
      get_url:
        url: "https://github.com/prometheus/alertmanager/releases/download/v{{ alertmanager_version }}/alertmanager-{{ alertmanager_version }}.linux-amd64.tar.gz"
        dest: /tmp/alertmanager.tar.gz

    - name: Extract Alertmanager
      unarchive:
        src: /tmp/alertmanager.tar.gz
        dest: /tmp/
        remote_src: yes

    - name: Move alertmanager binary to /usr/local/bin
      copy:
        src: "/tmp/alertmanager-{{ alertmanager_version }}.linux-amd64/alertmanager"
        dest: /usr/local/bin/alertmanager
        owner: "{{ alertmanager_user }}"
        group: "{{ alertmanager_user }}"
        mode: '0755'
        remote_src: yes

    - name: Move amtool binary to /usr/local/bin
      copy:
        src: "/tmp/alertmanager-{{ alertmanager_version }}.linux-amd64/amtool"
        dest: /usr/local/bin/amtool
        owner: "{{ alertmanager_user }}"
        group: "{{ alertmanager_user }}"
        mode: '0755'
        remote_src: yes

    - name: Copy default alertmanager config
      copy:
        src: "/tmp/alertmanager-{{ alertmanager_version }}.linux-amd64/alertmanager.yml"
        dest: "{{ alertmanager_dir }}/alertmanager.yml"
        owner: "{{ alertmanager_user }}"
        group: "{{ alertmanager_user }}"
        mode: '0644'
        remote_src: yes

    - name: Create alertmanager systemd service
      copy:
        dest: /etc/systemd/system/alertmanager.service
        content: |
          [Unit]
          Description=Alertmanager
          After=network.target

          [Service]
          User={{ alertmanager_user }}
          ExecStart=/usr/local/bin/alertmanager \
            --config.file={{ alertmanager_dir }}/alertmanager.yml \
            --storage.path={{ alertmanager_data_dir }}
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd and start alertmanager
      systemd:
        name: alertmanager
        daemon_reload: yes
        state: started
        enabled: yes

    - name: Cleanup temp files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/alertmanager.tar.gz
        - "/tmp/alertmanager-{{ alertmanager_version }}.linux-amd64"